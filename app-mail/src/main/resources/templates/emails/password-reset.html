<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Réinitialisation mot de passe</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; padding:20px">

<div style="max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:6px">

    <h2>Bonjour <span th:text="${name}">Utilisateur</span>,</h2>

    <p>
        Vous avez demandé la réinitialisation de votre mot de passe.
    </p>

    <p style="text-align:center;margin:30px 0">
        <a th:href="${resetLink}"
           style="background:#007bff;color:#fff;padding:12px 20px;
                  text-decoration:none;border-radius:4px;">
            Réinitialiser mon mot de passe
        </a>
    </p>

    <p>
        Ce lien est valable <strong>30 minutes</strong>.
        <br/>
        Si vous n’êtes pas à l’origine de cette demande, ignorez cet email.
    </p>

    <hr/>

    <p style="font-size:12px;color:#888">
        © PRINTXL – Sécurité
    </p>
</div>

</body>
</html>
