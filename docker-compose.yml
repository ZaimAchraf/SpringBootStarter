version: '1.0'

services:
  postgres:
    image: postgres:15
    container_name: spring_boot_starter_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: spring_boot_starter_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8081:80"
    volumes:
      - ./pg_admin:/var/lib/pgadmin/storage
    depends_on:
      - postgres
    restart: always

  maildev:
    image: maildev/maildev
    container_name: spring_boot_starter_maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"

  backend:
    build: .
    container_name: spring_boot_starter_backend
    ports:
      - "${APP_PORT:-8180}:8180"
    volumes:
      - ./logs:/app/logs
    environment:
      PORT: "8180"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST:-maildev}
      MAIL_PORT: "${MAIL_PORT:-1025}"
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
    depends_on:
      - postgres
      - maildev
    restart: always

volumes:
  postgres_data:
